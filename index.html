<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>PEXETAT - Exetat 2026</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2a1a 0%, #0d1f2d 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Fond animé */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            background: rgba(255, 180, 71, 0.3);
            border-radius: 50%;
            animation: float 12s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0.2; }
            50% { transform: translateY(-80px) translateX(40px); opacity: 0.6; }
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 550px;
            margin: 0 auto;
            padding: 16px 14px 30px;
        }

        /* Header : titre à gauche, burger à droite */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .logo h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ffd89b, #ffb347);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .menu-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            font-size: 1.8rem;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        .xp-badge {
            background: rgba(255,180,71,0.2);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            border: 1px solid #ffb347;
            color: #ffcd7e;
            position: absolute;
            right: 70px;
            top: 22px;
        }

        /* Menu latéral */
        .side-menu {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100vh;
            background: rgba(15, 25, 20, 0.97);
            backdrop-filter: blur(15px);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 70px 20px 20px;
            box-shadow: -2px 0 20px rgba(0,0,0,0.3);
        }
        .side-menu.open {
            right: 0;
        }
        .side-menu .menu-item {
            display: block;
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: rgba(255,255,255,0.08);
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
        }
        .side-menu .menu-item.active {
            background: #ffb347;
            color: #1a2a1a;
        }
        .close-menu {
            position: absolute;
            top: 15px;
            left: 15px;
            background: none;
            border: none;
            font-size: 1.8rem;
            color: white;
            cursor: pointer;
        }

        /* Cards */
        .card {
            background: rgba(25, 35, 40, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            border-left: 4px solid #ffb347;
            padding-left: 12px;
        }

        /* Programmes - avec effet au clic */
        .program-item {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 14px;
            margin: 10px 0;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 4px solid transparent;
        }
        .program-item.active-program {
            background: linear-gradient(120deg, #1e4a3a, #0f3628);
            border-left-color: #4cff9e;
            box-shadow: 0 0 12px rgba(76,255,158,0.2);
        }
        .program-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .progress-bar {
            height: 8px;
            background: #2c3e2f;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffb347, #ff8c1a);
            border-radius: 10px;
            transition: width 0.3s;
        }

        .add-program {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .add-program input {
            flex: 1;
            background: #0f1a14;
            border: 1px solid #ffb347;
            border-radius: 30px;
            padding: 10px;
            color: white;
        }

        /* Timer */
        .timer-settings {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
            justify-content: center;
        }
        .timer-settings input {
            background: #0f1a14;
            border: 1px solid #ffb347;
            border-radius: 30px;
            padding: 8px 16px;
            width: 80px;
            color: white;
            text-align: center;
        }
        .timer-number {
            font-size: 3rem;
            font-family: monospace;
            text-align: center;
            margin: 15px 0;
        }

        /* Bloc-notes style "maman je papy" */
        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .note-bubble {
            background: #1e2a24;
            border-radius: 24px;
            padding: 14px 18px;
            position: relative;
            transition: all 0.2s;
        }
        .note-bubble.user-note {
            background: #ffb347;
            color: #1a2a1a;
            align-self: flex-end;
            max-width: 85%;
        }
        .note-bubble.other-note {
            background: #2a3a30;
            align-self: flex-start;
            max-width: 85%;
        }
        .note-text-content {
            font-size: 1rem;
            word-break: break-word;
        }
        .note-date {
            font-size: 0.65rem;
            opacity: 0.6;
            margin-top: 5px;
        }
        .note-media {
            margin-top: 8px;
            max-width: 100%;
            border-radius: 16px;
        }
        .note-audio {
            margin-top: 8px;
            width: 100%;
        }
        .add-note-bar {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .add-note-bar input {
            flex: 1;
            background: #0f1a14;
            border: 1px solid #ffb347;
            border-radius: 30px;
            padding: 12px;
            color: white;
        }
        .icon-btns {
            display: flex;
            gap: 8px;
        }
        .icon-btn {
            background: rgba(255,180,71,0.2);
            border: 1px solid #ffb347;
            border-radius: 30px;
            padding: 10px 15px;
            color: #ffcd7e;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .btn {
            background: linear-gradient(135deg, #ffb347, #ff8c1a);
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            color: #1a2a1a;
            cursor: pointer;
        }
        .btn-outline {
            background: rgba(255,180,71,0.2);
            border: 1px solid #ffb347;
            color: #ffcd7e;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
        }

        /* Quiz */
        .subjects-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 12px 0;
        }
        .subject-chip {
            background: #1e2a24;
            border-radius: 30px;
            padding: 6px 14px;
            font-size: 0.8rem;
            cursor: pointer;
        }
        .subject-chip.active {
            background: #ffb347;
            color: #1a2a1a;
        }
        .quiz-option {
            background: #1e2a24;
            border-radius: 30px;
            padding: 10px 16px;
            margin: 8px 0;
            cursor: pointer;
        }
        .quiz-option.correct { background: #2e7d64; }
        .quiz-option.wrong { background: #a13e3e; }

        .phrase-card {
            background: #1e2a24;
            border-radius: 20px;
            padding: 14px;
            margin: 10px 0;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        footer { text-align: center; font-size: 0.7rem; margin-top: 20px; color: #6a8f6f; }
        button { cursor: pointer; }
        .text-center { text-align: center; }
    </style>
</head>
<body>
<div class="particles" id="particles"></div>

<div class="side-menu" id="sideMenu">
    <button class="close-menu" id="closeMenuBtn">✕</button>
    <button class="menu-item active" data-tab="revision">📚 RÉVISION</button>
    <button class="menu-item" data-tab="quiz">🎯 QUIZ EXETAT</button>
    <button class="menu-item" data-tab="english">🗣️ ENGLISH ORAL</button>
    <button class="menu-item" data-tab="notes">📝 BLOC-NOTES</button>
</div>

<div class="app">
    <div class="header">
        <div class="logo"><h1>📘 PEXETAT</h1></div>
        <div>
            <span class="xp-badge" id="xpDisplay">⭐ 0 XP</span>
            <button class="menu-btn" id="menuBtn">☰</button>
        </div>
    </div>

    <!-- RÉVISION -->
    <div id="revisionTab" class="tab-content active">
        <div class="card">
            <div class="card-title">📋 Programmes de révision</div>
            <div id="programsList"></div>
            <div class="add-program">
                <input type="text" id="newProgram" placeholder="ex: Maths : intégrales">
                <button class="btn" id="addProgramBtn">+</button>
            </div>
        </div>

        <div class="card">
            <div class="card-title">⏱️ Pomodoro</div>
            <div class="timer-settings">
                <input type="number" id="pomodoroMinutes" value="25" min="1" max="60"> min
                <button class="btn-outline" id="applyTimerBtn">Appliquer</button>
            </div>
            <div class="timer-number" id="timerDisplay">25:00</div>
            <div style="display:flex; gap:10px; justify-content:center;">
                <button class="btn" id="startTimer">▶ Démarrer</button>
                <button class="btn-outline" id="pauseTimer">⏸ Pause</button>
                <button class="btn-outline" id="resetTimer">🔄 Reset</button>
            </div>
            <div id="timerMessage" class="text-center" style="font-size:0.8rem; margin-top:8px;"></div>
        </div>
    </div>

    <!-- QUIZ -->
    <div id="quizTab" class="tab-content">
        <div class="card">
            <div class="card-title">🧪 Quiz par matière</div>
            <div class="subjects-grid" id="subjectsContainer"></div>
            <div id="quizArea"></div>
        </div>
    </div>

    <!-- ANGLAIS -->
    <div id="englishTab" class="tab-content">
        <div class="card">
            <div class="card-title">🇬🇧 English Oral</div>
            <div class="subjects-grid" id="oralSubjectsContainer">
                <div class="subject-chip active" data-oral="conversation">💬 Conversations</div>
                <div class="subject-chip" data-oral="presentation">👤 Présentation</div>
            </div>
            <div id="oralArea"></div>
        </div>
    </div>

    <!-- BLOC-NOTES style message -->
    <div id="notesTab" class="tab-content">
        <div class="card">
            <div class="card-title">📝 Messages</div>
            <div id="notesList" class="notes-container"></div>
            
            <div class="add-note-bar">
                <input type="text" id="noteInput" placeholder="Écris un message...">
                <div class="icon-btns">
                    <button class="icon-btn" id="sendTextBtn">📤</button>
                    <button class="icon-btn" id="startRecordBtn">🎙️</button>
                    <button class="icon-btn" id="stopRecordBtn" style="display:none;">⏹️</button>
                    <button class="icon-btn" id="imageUploadBtn">📷</button>
                </div>
            </div>
            <input type="file" id="imageUpload" accept="image/*" capture="environment" style="display:none;">
        </div>
    </div>
    <footer>PEXETAT · @pansmiansobi</footer>
</div>

<script>
    // PARTICULES
    function createParticles() {
        const container = document.getElementById('particles');
        for(let i=0;i<50;i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random()*6+2;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'%';
            p.style.top = Math.random()*100+'%';
            p.style.animationDelay = Math.random()*10+'s';
            p.style.animationDuration = (Math.random()*10+10)+'s';
            container.appendChild(p);
        }
    }
    createParticles();

    // XP
    let xp = parseInt(localStorage.getItem('pex_xp')) || 0;
    function updateXPUI() {
        document.getElementById('xpDisplay').innerHTML = `⭐ ${xp} XP`;
        localStorage.setItem('pex_xp', xp);
    }
    function addXP(pts) { xp += pts; updateXPUI(); }
    updateXPUI();

    // PROGRAMMES
    let programs = JSON.parse(localStorage.getItem('pex_progs')) || [
        { name: "Maths : analyse", progress: 0 },
        { name: "Biologie : génétique", progress: 0 },
        { name: "Physique : mécanique", progress: 0 }
    ];
    let activeProgramIndex = 0;

    function renderPrograms() {
        const container = document.getElementById('programsList');
        container.innerHTML = programs.map((p,i)=>`
            <div class="program-item ${i === activeProgramIndex ? 'active-program' : ''}" data-index="${i}">
                <div class="program-header">
                    <strong>📌 ${escapeHtml(p.name)}</strong>
                    <span>${p.progress}%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" style="width:${p.progress}%"></div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.program-item').forEach(el => {
            el.addEventListener('click', (e) => {
                let idx = parseInt(el.dataset.index);
                activeProgramIndex = idx;
                renderPrograms();
            });
        });
        localStorage.setItem('pex_progs', JSON.stringify(programs));
    }
    
    function addProgressToActive() {
        if(programs[activeProgramIndex] && programs[activeProgramIndex].progress < 100) {
            programs[activeProgramIndex].progress = Math.min(100, programs[activeProgramIndex].progress + 10);
            renderPrograms();
            addXP(2);
            document.getElementById('timerMessage').innerHTML = `🎉 +10% sur "${programs[activeProgramIndex].name}" ! +2 XP`;
            setTimeout(()=>{if(document.getElementById('timerMessage')) document.getElementById('timerMessage').innerHTML='';},3000);
        }
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m=>m=='&'?'&amp;':m=='<'?'&lt;':'&gt;'); }
    
    document.getElementById('addProgramBtn')?.addEventListener('click',()=>{
        let inp = document.getElementById('newProgram');
        if(inp.value.trim()) {
            programs.push({ name: inp.value.trim(), progress: 0 });
            renderPrograms();
            inp.value = '';
        }
    });
    renderPrograms();

    // POMODORO
    let timerSec = 25*60, timerInt = null, timerRun = false;
    function updateTimerDisplay() {
        let m = Math.floor(timerSec/60), s = timerSec%60;
        document.getElementById('timerDisplay').innerHTML = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }
    function startTimer() {
        if(timerInt) clearInterval(timerInt);
        timerRun = true;
        timerInt = setInterval(() => {
            if(timerSec > 0 && timerRun) {
                timerSec--;
                updateTimerDisplay();
                if(timerSec === 0) {
                    clearInterval(timerInt);
                    timerRun = false;
                    addProgressToActive();
                    alert("✅ Pomodoro terminé ! +10% de progression !");
                }
            }
        }, 1000);
    }
    document.getElementById('startTimer')?.addEventListener('click', startTimer);
    document.getElementById('pauseTimer')?.addEventListener('click', () => { timerRun=false; if(timerInt)clearInterval(timerInt); timerInt=null; });
    document.getElementById('resetTimer')?.addEventListener('click', () => { timerRun=false; if(timerInt)clearInterval(timerInt); let mins=parseInt(document.getElementById('pomodoroMinutes').value); timerSec = (isNaN(mins)?25:mins)*60; updateTimerDisplay(); });
    document.getElementById('applyTimerBtn')?.addEventListener('click', () => { let mins=parseInt(document.getElementById('pomodoroMinutes').value); if(!isNaN(mins) && mins>0) { timerSec = mins*60; updateTimerDisplay(); } });
    updateTimerDisplay();

    // QUIZ
    const quizDB = {
        maths: [{ q: "L'équation (e^x - e^-x)/(e^2x - e^-2x) = e^x/5 a pour solution :", options: ["1/2 ln2", "0 et 1/2 ln2", "0 et ln2", "ln2", "0"], correct: 1, expl: "x = 1/2 ln2" }],
        biologie: [{ q: "Les descendants d'un croisement entre variétés différentes :", options: ["allèles","diploïde","gène","génotype","hybrides"], correct: 4, expl: "Hybrides F1" }],
        physique: [{ q: "72 km/h en m/s et Ec (1000kg) ?", options: ["20 et 2.10⁵J","20 et 4.10⁵J","72 et 2.10⁵J","20 et 72.10⁵J"], correct: 0, expl: "20m/s, Ec=200kJ" }],
        chimie: [{ q: "pH d'une solution HCl 10⁻³M ?", options: ["0","1","3","7","8"], correct: 2, expl: "pH = 3" }],
        informatique: [{ q: "Fonction du routeur ?", options: ["Acheminer paquets","Stocker données","Afficher","Imprimer","Calculer"], correct: 0, expl: "Routeur = routage IP" }]
    };
    let currentSubject = "maths", currentQIdx = 0;
    function renderSubjects() {
        const container = document.getElementById('subjectsContainer');
        container.innerHTML = Object.keys(quizDB).map(s=>`<div class="subject-chip ${s===currentSubject?'active':''}" data-sub="${s}">📖 ${s.toUpperCase()}</div>`).join('');
        document.querySelectorAll('.subject-chip[data-sub]').forEach(el=>{el.addEventListener('click',()=>{currentSubject=el.dataset.sub; currentQIdx=0; renderSubjects(); renderQuiz();});});
        renderQuiz();
    }
    function renderQuiz() {
        const q = quizDB[currentSubject][currentQIdx];
        const container = document.getElementById('quizArea');
        container.innerHTML = `<div class="quiz-question"><div style="font-weight:bold;">❓ ${q.q}</div><div id="quizOpts"></div><div id="quizFeed"></div><div style="display:flex; justify-content:space-between; margin-top:15px;"><button class="btn-outline" id="prevQ">◀</button><span>1/1</span><button class="btn-outline" id="nextQ">▶</button></div></div>`;
        const optsDiv = document.getElementById('quizOpts');
        q.options.forEach((opt,idx)=>{
            const optDiv = document.createElement('div');
            optDiv.className = 'quiz-option';
            optDiv.innerText = `${String.fromCharCode(65+idx)}. ${opt}`;
            optDiv.addEventListener('click',()=>{
                document.querySelectorAll('.quiz-option').forEach(el=>el.classList.remove('correct','wrong'));
                if(idx===q.correct){ optDiv.classList.add('correct'); document.getElementById('quizFeed').innerHTML = `✅ Correct ! +1 XP`; addXP(1); }
                else { optDiv.classList.add('wrong'); document.getElementById('quizFeed').innerHTML = `❌ Faux. Réponse: ${q.options[q.correct]} -1 XP`; xp = Math.max(0, xp-1); updateXPUI(); }
            });
            optsDiv.appendChild(optDiv);
        });
        document.getElementById('prevQ')?.addEventListener('click',()=>{});
        document.getElementById('nextQ')?.addEventListener('click',()=>{});
    }
    renderSubjects();

    // ANGLAIS
    const conversations = [
        { eng: "Hello! How are you today?", fr: "Bonjour ! Comment allez-vous ?" },
        { eng: "I'm fine, thank you. And you?", fr: "Je vais bien, merci. Et vous ?" }
    ];
    let oralSection = "conversation";
    function renderOral() {
        const area = document.getElementById('oralArea');
        if(oralSection === "conversation"){
            area.innerHTML = conversations.map(c=>`<div class="phrase-card"><strong>🗣️ ${c.eng}</strong><br><span>📖 ${c.fr}</span><button class="btn-outline speakBtn" data-text="${c.eng}">🔊 Écouter</button></div>`).join('');
        } else {
            area.innerHTML = `<div class="phrase-card"><strong>🎙️ Good morning, dear examiners.</strong><br><span>📖 Bonjour, chers examinateurs.</span><button class="btn-outline speakBtn" data-text="Good morning, dear examiners.">🔊 Écouter</button></div>`;
        }
        document.querySelectorAll('.speakBtn').forEach(btn=>{btn.addEventListener('click',()=>{let u=new SpeechSynthesisUtterance(btn.dataset.text); u.lang='en-US'; speechSynthesis.cancel(); speechSynthesis.speak(u);});});
    }
    document.querySelectorAll('[data-oral]').forEach(el=>{el.addEventListener('click',()=>{oralSection=el.dataset.oral; document.querySelectorAll('[data-oral]').forEach(c=>c.classList.remove('active')); el.classList.add('active'); renderOral();});});
    renderOral();

    // BLOC-NOTES STYLE "maman je papy"
    let notes = JSON.parse(localStorage.getItem('pex_notes_msg')) || [];
    let mediaRecorder, audioChunks = [];
    
    function renderNotes() {
        const container = document.getElementById('notesList');
        container.innerHTML = notes.map((note, idx) => `
            <div class="note-bubble ${note.sender === 'user' ? 'user-note' : 'other-note'}">
                <div class="note-text-content">${escapeHtml(note.text)}</div>
                ${note.image ? `<img src="${note.image}" class="note-media">` : ''}
                ${note.audio ? `<audio controls src="${note.audio}" class="note-audio"></audio>` : ''}
                <div class="note-date">${note.date}</div>
                <button class="btn-outline delete-note" data-idx="${idx}" style="margin-top:8px; font-size:0.7rem; padding:4px 12px;">🗑️</button>
            </div>
        `).join('');
        document.querySelectorAll('.delete-note').forEach(btn=>{
            btn.addEventListener('click',()=>{
                let idx = parseInt(btn.dataset.idx);
                notes.splice(idx,1);
                localStorage.setItem('pex_notes_msg', JSON.stringify(notes));
                renderNotes();
            });
        });
    }
    
    document.getElementById('sendTextBtn')?.addEventListener('click',()=>{
        let inp = document.getElementById('noteInput');
        if(inp.value.trim()){
            notes.unshift({ sender: 'user', text: inp.value.trim(), date: new Date().toLocaleString(), image: null, audio: null });
            localStorage.setItem('pex_notes_msg', JSON.stringify(notes));
            renderNotes();
            inp.value = '';
        }
    });
    
    document.getElementById('imageUploadBtn')?.addEventListener('click',()=>{
        document.getElementById('imageUpload').click();
    });
    
    document.getElementById('imageUpload')?.addEventListener('change',(e)=>{
        const file = e.target.files[0];
        if(file){
            const reader = new FileReader();
            reader.onload = function(ev){
                notes.unshift({ sender: 'user', text: '📷 Photo', date: new Date().toLocaleString(), image: ev.target.result, audio: null });
                localStorage.setItem('pex_notes_msg', JSON.stringify(notes));
                renderNotes();
            };
            reader.readAsDataURL(file);
        }
    });
    
    document.getElementById('startRecordBtn')?.addEventListener('click', async()=>{
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader();
            reader.onload = function(ev){
                notes.unshift({ sender: 'user', text: '🎤 Message vocal', date: new Date().toLocaleString(), image: null, audio: ev.target.result });
                localStorage.setItem('pex_notes_msg', JSON.stringify(notes));
                renderNotes();
            };
            reader.readAsDataURL(audioBlob);
            stream.getTracks().forEach(t=>t.stop());
            document.getElementById('startRecordBtn').style.display = 'inline-flex';
            document.getElementById('stopRecordBtn').style.display = 'none';
        };
        mediaRecorder.start();
        document.getElementById('startRecordBtn').style.display = 'none';
        document.getElementById('stopRecordBtn').style.display = 'inline-flex';
    });
    
    document.getElementById('stopRecordBtn')?.addEventListener('click',()=>{
        if(mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    });
    
    renderNotes();

    // MENU
    const sideMenu = document.getElementById('sideMenu');
    document.getElementById('menuBtn')?.addEventListener('click',()=>{ sideMenu.classList.add('open'); });
    document.getElementById('closeMenuBtn')?.addEventListener('click',()=>{ sideMenu.classList.remove('open'); });
    
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        document.querySelector(`.menu-item[data-tab="${tab}"]`).classList.add('active');
        sideMenu.classList.remove('open');
        if(tab === 'quiz') renderSubjects();
        if(tab === 'english') renderOral();
    }
    document.querySelectorAll('.menu-item[data-tab]').forEach(btn=>{
        btn.addEventListener('click',()=>{ switchTab(btn.dataset.tab); });
    });
</script>
</body>
</html>
